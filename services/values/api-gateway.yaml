# api-gateway reference values from services/api-gateway/main.go
service: api-gateway
role: public edge / reverse proxy to all backend services
port: 8080
requestPath: true        # HPA candidate
publicFacing: true       # behind ingress at app.<domain>
probes:
  liveness:  { path: /livez,   port: 8080 }   # always 200 (process alive)
  readiness: { path: /healthz, port: 8080 }   # 200, no dependency check
dependencies:
  postgres: false
  redis: true            # REDIS_URL for rate limiting
  sqs: false
env:
  PORT: "8080"
  RATE_LIMIT_PER_MIN: "600"                       # Per-user (falls back to per-IP) budget; health checks exempt. Default 600.
  REDIS_URL: ""                                   # Required, points at redis StatefulSet.
  JWT_SECRET: "change-me-in-production"           # default is a placeholder, override in prod
  ORDER_SERVICE_URL: "http://order-service:8081"
  INVENTORY_SERVICE_URL: "http://inventory-service:8082"
  PAYMENT_SERVICE_URL: "http://payment-service:8083"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8084"
  SHIPPING_SERVICE_URL: "http://shipping-service:8085"
  DASHBOARD_SERVICE_URL: "http://dashboard-api:8086"
secrets:                 # Pull from Secrets Manager, not ConfigMaps.
  - JWT_SECRET
  - REDIS_URL            # contains redis password
