# inventory-service reference values from services/inventory-service/main.go
service: inventory-service
role: stock levels / reservations
port: 8082
requestPath: true        # candidate for HPA (worker calls it during event processing)
publicFacing: false      # reached via api-gateway / worker only
probes:
  liveness:  { path: /livez,   port: 8082 }   # always 200
  readiness: { path: /healthz, port: 8082 }   # pings DB, returns 503 when DB down
dependencies:
  postgres: true
  redis: false
  sqs: false
env:
  PORT: "8082"
  DATABASE_URL: ""       # Required, postgres, contains password.
secrets:
  - DATABASE_URL
