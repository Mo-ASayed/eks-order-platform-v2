# services/values quick reference
# Ports, env vars and dependencies come from services/<name>/main.go.
# Probes: /livez is process-only; /healthz checks DB where the service has one.

services:
  api-gateway:          { port: 8080, public: true,  hpa: true,  deps: [redis] }
  order-service:        { port: 8081, public: false, hpa: true,  deps: [postgres, sqs] }   # producer
  inventory-service:    { port: 8082, public: false, hpa: true,  deps: [postgres] }
  payment-service:      { port: 8083, public: false, hpa: true,  deps: [postgres, sqs] }   # producer
  notification-service: { port: 8084, public: false, hpa: false, deps: [postgres] }
  shipping-service:     { port: 8085, public: false, hpa: true,  deps: [postgres, sqs] }   # producer
  dashboard-api:        { port: 8086, public: false, hpa: true,  deps: [postgres] }
  worker:               { healthPort: 8090, public: false, hpa: false, deps: [sqs] }        # consumer -> DLQ
  scheduler:            { healthPort: 8091, public: false, hpa: false, deps: [postgres] }

# Port map: 8080-8086 for HTTP APIs, 8090-8091 for health-only workers.

# Backing services:
#   postgres StatefulSet -> DATABASE_URL for seven services
#   redis StatefulSet    -> REDIS_URL for api-gateway
#   SQS from Terraform   -> producers: order/payment/shipping; consumer: worker

# Secrets come from Secrets Manager, not ConfigMaps:
#   DATABASE_URL  (every postgres service)
#   JWT_SECRET, REDIS_URL  (api-gateway)
# Not secret: *_SERVICE_URL (internal DNS), SQS_QUEUE_URL (auth is IRSA, not keys).

# IRSA needed on pods:
#   order, payment, shipping -> sqs:SendMessage
#   worker                   -> sqs:ReceiveMessage/DeleteMessage/GetQueueAttributes

# No service exposes /metrics yet, so app-level ServiceMonitors need Go
# instrumentation first.
