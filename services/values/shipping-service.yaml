# shipping-service reference values from services/shipping-service/main.go
service: shipping-service
role: shipping / tracking numbers; EVENT PRODUCER (publishes to SQS)
port: 8085
requestPath: true        # HPA candidate
publicFacing: false      # reached via api-gateway
probes:
  liveness:  { path: /livez,   port: 8085 }   # always 200
  readiness: { path: /healthz, port: 8085 }   # pings DB, returns 503 when DB down
dependencies:
  postgres: true
  redis: false
  sqs: true              # producer
env:
  PORT: "8085"
  DATABASE_URL: ""       # Required, postgres, contains password.
  SQS_QUEUE_URL: ""      # Required, events queue.
secrets:
  - DATABASE_URL
