# payment-service reference values from services/payment-service/main.go
service: payment-service
role: payment processing; EVENT PRODUCER (publishes to SQS)
port: 8083
requestPath: true        # HPA candidate
publicFacing: false      # reached via api-gateway
probes:
  liveness:  { path: /livez,   port: 8083 }   # always 200
  readiness: { path: /healthz, port: 8083 }   # pings DB, returns 503 when DB down
dependencies:
  postgres: true
  redis: false
  sqs: true              # producer
env:
  PORT: "8083"
  DATABASE_URL: ""       # Required, postgres, contains password.
  SQS_QUEUE_URL: ""      # Required, events queue.
secrets:
  - DATABASE_URL
