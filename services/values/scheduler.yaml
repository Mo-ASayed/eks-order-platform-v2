# scheduler reference values from services/scheduler/main.go
service: scheduler
role: periodic/cron jobs against the database (background)
port: null               # no public/api port
healthPort: 8091         # HEALTH_PORT for probes only.
requestPath: false       # Background job, not request-scaled.
publicFacing: false
probes:
  liveness:  { path: /livez,   port: 8091 }   # always 200
  readiness: { path: /healthz, port: 8091 }   # always 200
dependencies:
  postgres: true
  redis: false
  sqs: false
env:
  HEALTH_PORT: "8091"
  DATABASE_URL: ""       # Required, postgres, contains password.
secrets:
  - DATABASE_URL
# Run one replica until cron work has leader election.
