# worker reference values from services/worker/main.go
service: worker
role: event consumer - polls SQS and fans out to backend services
port: null               # No public API port.
healthPort: 8090         # HEALTH_PORT for probes only.
requestPath: false       # Background consumer, not request-scaled.
publicFacing: false
probes:
  liveness:  { path: /livez,   port: 8090 }   # always 200
  readiness: { path: /healthz, port: 8090 }   # always 200
dependencies:
  postgres: false
  redis: false
  sqs: true              # Consumer permissions; DLQ alarm watches failures.
env:
  HEALTH_PORT: "8090"
  SQS_QUEUE_URL: ""      # Required, main events queue.
  ORDER_SERVICE_URL: "http://order-service:8081"
  INVENTORY_SERVICE_URL: "http://inventory-service:8082"
  PAYMENT_SERVICE_URL: "http://payment-service:8083"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8084"
  SHIPPING_SERVICE_URL: "http://shipping-service:8085"
secrets: []              # No DB or Redis creds; SQS auth uses IRSA.
# IRSA needs sqs:ReceiveMessage/DeleteMessage/GetQueueAttributes on the queue.
