apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-platform-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: order-platform
  source:
    repoURL: https://github.com/Mo-ASayed/eks-order-platform-v2.git
    targetRevision: main
    path: Kubernetes/apps/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  # HPA owns the replicas, so ignore that field here
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  revisionHistoryLimit: 10
