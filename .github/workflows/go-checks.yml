name: Go checks


on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-test:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - dashboard-api
          - inventory-service
          - notification-service
          - order-service
          - payment-service
          - scheduler
          - shipping-service
          - worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Match the service Dockerfiles' Go version.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: services/${{ matrix.service }}

      - name: go test
        working-directory: services/${{ matrix.service }}
        run: go test ./...
