name: PR & Branch Checks

# Validation only for PRs and non-main pushes. No cloud credentials are used:
# Terraform runs with -backend=false and nothing is applied.

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read # paths-filter lists changed files via the PR API

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.10.5"

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      kubernetes: ${{ steps.filter.outputs.kubernetes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/pr-checks.yml'
            kubernetes:
              - 'Kubernetes/**'
              - 'argocd/**'
              - '.github/workflows/pr-checks.yml'

  terraform-validate:
    name: Terraform validate / tflint / checkov
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate (envs/dev)
        working-directory: terraform/envs/dev
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive --config "$(pwd)/.tflint.hcl"

      - name: Run checkov (terraform)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          config_file: .checkov.yml
          quiet: true
          soft_fail: true
          output_format: cli
          output_file_path: console

      - name: Run trivy config (terraform)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          exit-code: "1"

  kubernetes-validate:
    name: Kustomize build / kubeconform / checkov
    needs: changes
    if: needs.changes.outputs.kubernetes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Build and validate overlays
        run: |
          set -euo pipefail
          for overlay in Kubernetes/apps/overlays/dev Kubernetes/apps/overlays/prod; do
            echo "::group::$overlay"
            kustomize build "$overlay" > "/tmp/$(basename "$overlay").yaml"
            kubeconform \
              -strict \
              -ignore-missing-schemas \
              -summary \
              "/tmp/$(basename "$overlay").yaml"
            echo "::endgroup::"
          done

      - name: Run checkov (kubernetes)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: Kubernetes/
          framework: kubernetes
          config_file: .checkov.yml
          quiet: true
          soft_fail: true
          output_format: cli
          output_file_path: console

      - name: Run trivy config (kubernetes)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Kubernetes/
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          exit-code: "1"