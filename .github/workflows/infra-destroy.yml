name: Destroy Infrastructure

# Phased teardown. Keeps module.dns and module.github_actions as rebuild anchors
# (DNS zone + CI identity). Manual only: typed confirmation + `dev` approval.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm tearing down the dev infra'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: infra-cd # shared with infra-cd so apply and destroy never overlap
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TERRAFORM_VERSION: "1.10.5"
  TF_WORKING_DIR: terraform/envs/dev

jobs:
  destroy:
    name: Terraform destroy (keep DNS)
    runs-on: ubuntu-latest
    environment: dev # manual approval gate (required reviewers)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        env:
          CONFIRM_PHRASE: ${{ github.event.inputs.confirm }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/validate-confirmation.sh" destroy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Pre-clean ArgoCD applications
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/preclean-argocd-apps.sh"

      # Delete CNPG Clusters before the operator goes, so finalisers clear and the
      # data namespace doesn't hang in Terminating.
      - name: Pre-clean stateful tier
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/preclean-stateful-tier.sh"

      - name: Terraform destroy stateful tier and event bus
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -input=false -auto-approve \
            -target=module.stateful_tier \
            -target=module.eventbus

      # external-secrets keeps its CRDs (resource-policy: keep); Helm reports that
      # as an uninstall error and stalls the platform_addons destroy, so clear it first.
      - name: Pre-clean external-secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/preclean-external-secrets.sh"

      - name: Terraform destroy platform addons
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -input=false -auto-approve -target=module.platform_addons

      - name: Wait for Kubernetes load balancers
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/wait-for-load-balancers.sh"

      - name: Drain Karpenter nodes
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/drain-karpenter-nodes.sh"

      # Capture before module.vpc is destroyed, needed by the ENI below.
      - name: Capture VPC ID
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: echo "VPC_ID=$(terraform output -raw vpc_id)" >> "$GITHUB_ENV"

      # DNS and CI stay out of scope so the next pipeline can authenticate and rebuild.
      - name: Terraform destroy cluster
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -input=false -auto-approve \
            -target=aws_eks_access_policy_association.github_actions \
            -target=aws_eks_access_entry.github_actions \
            -target=module.karpenter \
            -target=module.eks

      # EKS control-plane ENIs release asynchronously; wait so the VPC destroy
      # doesn't race them.
      - name: Wait for EKS control-plane ENI cleanup
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: bash "$GITHUB_WORKSPACE/scripts/pipeline-scripts/infra-destroy/wait-for-eks-eni-cleanup.sh"

      - name: Terraform destroy VPC
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -input=false -auto-approve -target=module.vpc
