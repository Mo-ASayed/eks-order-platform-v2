apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: apps
  labels:
    app.kubernetes.io/name: scheduler
    app.kubernetes.io/part-of: order-fulfillment
spec:
  # Keep one replica until the scheduler has leader election.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler
        app.kubernetes.io/part-of: order-fulfillment
    spec:
      containers:
        - name: scheduler
          image: 767398132018.dkr.ecr.eu-west-2.amazonaws.com/scheduler
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: scheduler-config
            - secretRef:
                name: scheduler-secrets
          ports:
            - name: health
              containerPort: 8091
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
