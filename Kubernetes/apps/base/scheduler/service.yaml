apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: apps
  labels:
    app.kubernetes.io/name: scheduler
    app.kubernetes.io/part-of: order-fulfillment
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scheduler
  ports:
    # Health-only service for probes and port-forward debugging.
    - name: health
      port: 8091
      targetPort: health
