apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: apps
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: order-fulfillment
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: order-fulfillment
    spec:
      serviceAccountName: worker
      containers:
        - name: worker
          image: 767398132018.dkr.ecr.eu-west-2.amazonaws.com/worker-service
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: worker-config
          ports:
            - name: health
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
