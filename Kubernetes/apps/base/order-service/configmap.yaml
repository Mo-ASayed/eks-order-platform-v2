apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: apps
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: order-fulfillment
data:
  PORT: "8081"
  SQS_QUEUE_URL: "https://sqs.eu-west-2.amazonaws.com/767398132018/eks-v2-sqs-queue"
  # Used to resolve authoritative product prices and validate stock at order creation.
  INVENTORY_SERVICE_URL: "http://inventory-service:8082"
