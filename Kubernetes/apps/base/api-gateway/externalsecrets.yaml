apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-gateway-secrets
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: api-gateway-secrets
    creationPolicy: Owner
    template:
      data:
        REDIS_URL: "redis://:{{ .redis_password }}@redis.data.svc.cluster.local:6379/0"
        JWT_SECRET: "{{ .jwt_secret }}"
  data:
    - secretKey: redis_password
      remoteRef:
        key: eks-v2/secret/redis
        property: password
    - secretKey: jwt_secret
      remoteRef:
        key: eks-v2/secret/api-gateway-secrets
        property: JWT_SECRET
