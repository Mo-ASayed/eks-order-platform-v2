apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notification-service-secrets
  namespace: apps
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: order-fulfillment
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notification-service-secrets
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgres://app:{{ .password }}@postgres-rw.data.svc.cluster.local:5432/app?sslmode=disable"
  data:
    - secretKey: password
      remoteRef:
        key: eks-v2/secret/postgres/app
        property: password
